            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {

      } catch (err) {

      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).

tive}\n  .gene-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px;gap:20px;flex-wrap:wrap}\n  .gene-title{font-size:20px;font-weight:500;letter-spacing:-0.005em}\n  .gene-title .sep{color:var(--muted);margin:0 8px;font-weight:400}\n  .gene-meta{font-family:ui-monospace,monospace;font-size:11px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase}\n  .gene-meta span{color:var(--ink)}\n\n  .map-wrap{position:relative;margin-top:38px}\n  .map-scroll{position:relative;overflow-x:auto;overflow-y:visible;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:#2a3340 transparent;padding-bottom:4px}\n  .map-scroll::-webkit-scrollbar{height:8px}\n  .map-scroll::-webkit-scrollbar-thumb{background:#2a3340;border-radius:4px}\n  .map-scroll::-webkit-scrollbar-track{background:transparent}\n  svg.gene-map{display:block;width:100%;height:auto;overflow:visible;min-width:700px}\n  .scroll-hint{display:none;font-family:ui-monospace,monospace;font-size:10.5px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-top:8px;opacity:0.7}\n\n  /* Card - desktop floating tooltip */\n  .card{\n    position:absolute;pointer-events:none;\n    background:#0b0e12;border:1px solid #2a3340;border-radius:10px;\n    padding:14px 16px 16px;min-width:300px;max-width:340px;\n    box-shadow:0 18px 50px rgba(0,0,0,0.55), 0 2px 6px rgba(0,0,0,0.4);\n    opacity:0;transform:translate(-50%, 8px) scale(0.96);\n    transition:opacity 200ms ease-out, transform 200ms ease-out;\n    z-index:10;\n  }\n  .card.visible{opacity:1;transform:translate(-50%, 0) scale(1)}\n  .card .close-x{display:none}\n\n  /* Mobile: card becomes a bottom sheet */\n  .card-backdrop{display:none}\n  @media (max-width:720px){\n    .card-backdrop{\n      display:block;position:fixed;inset:0;background:rgba(8,10,13,0.6);\n      opacity:0;pointer-events:none;transition:opacity 200ms ease-out;z-index:40;\n      -webkit-backdrop-filter:blur(2px);backdrop-filter etter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin:6px 0 6px}\n  .feat{display:grid;grid-template-columns:118px 1fr 34px;align-items:center;gap:8px;margin-bottom:4px;font-size:11px}\n  .feat .name{color:var(--ink);opacity:0.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}\n  .feat .bar{height:6px;background:#1a2029;border-radius:3px;overflow:hidden;position:relative}\n  .feat .bar .fill{height:100%;border-radius:3px;background:var(--fill,var(--accent));transition:width 220ms ease-out}\n  .feat.nd .bar{background:#1a2029;border:1px dashed #2c3541}\n  .feat.nd .name{opacity:0.45}\n  .feat .pct{font-family:ui-monospace,monospace;font-size:10.5px;color:var(--muted);text-align:right}\n  .feat.nd .pct{color:#545d6b}\n\n  /* SVG tick + domain styles */\n  .domain-label{font-family:\"Helvetica Neue\",Helvetica,Arial,sans-serif;font-size:10.5px;fill:var(--muted);letter-spacing:0.04em;text-transform:uppercase;font-weight:500}\n  .axis-tick{font-family:ui-monospace,monospace;font-size:10px;fill:var(--muted)}\n  .axis-line{stroke:var(--rule);stroke-width:1}\n\n  .tick{cursor:pointer;transition:stroke-width 180ms ease-out, opacity 180ms ease-out, filter 180ms ease-out}\n  .tick:hover, .tick.active{filter:brightness(1.4) drop-shadow(0 0 4px currentColor)}\n  .tick-hit{cursor:pointer;fill:transparent}\n  .tick-dot{pointer-events:none;transition:r 180ms ease-out, opacity 180ms ease-out}\n\n  footer{max-width:1400px;margin:32px auto 0;font-size:12px;color:var(--muted);line-height:1.6}\n  footer code{font-family:ui-monospace,monospace;color:var(--accent)}\n\n  /* Global mobile tweaks */\n  @media (max-width:720px){\n    body{padding:22px 14px 60px}\n    header{margin-bottom:18px}\n    h1{font-size:26px}\n    header p{font-size:13px}\n    .legend{gap:10px 14px;padding:12px 14px;margin:14px auto 20px}\n    .legend .divider{display:none}\n    .legend .chip{font-size:12px}\n    .gene{padding:18px 16px 22px;border-radius:10px}\n    .stack{gap:18px}\n    .g enotypes).sort((a,b)=>b[1]-a[1]);\n}\n\nfunction renderGene(g){\n  const data = GENE_DATA[g.key];\n  if (!data) return;\n\n  const panel = document.createElement('section');\n  panel.className = 'gene';\n  panel.innerHTML = `\n    <div class=\"gene-head\">\n      <div class=\"gene-title\">${g.name} <span class=\"sep\">/<\u002Fspan> ${g.alias}<\u002Fdiv>\n      <div class=\"gene-meta\">${data.patients} <span>patients<\u002Fspan> · ${data.mutations.length} <span>unique mutations<\u002Fspan> · ${g.length} <span>aa<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  `;\n\n  const wrap = document.createElement('div');\n  wrap.className = 'map-wrap';\n  panel.appendChild(wrap);\n\n  const scroll = document.createElement('div');\n  scroll.className = 'map-scroll';\n  wrap.appendChild(scroll);\n\n  // SVG layout\n  const W = 1340, H = 220;\n  const padL = 24, padR = 24, padT = 80, padB = 42;\n  const barY = padT + 30;\n  const barH = 34;\n  const innerW = W - padL - padR;\n\n  const svg = mkSVG('svg', {class:'gene-map', viewBox:`0 0 ${W} ${H}`, preserveAspectRatio:'xMidYMid meet'});\n  scroll.appendChild(svg);\n\n  const hint = document.createElement('div');\n  hint.className = 'scroll-hint';\n  hint.textContent = '← scroll to explore →';\n  wrap.appendChild(hint);\n\n  const xOf = pos => padL + (pos / g.length) * innerW;\n\n  // ---- Ticks  (draw below bar? or above? prefer above for legibility)\n  // Group mutations by position bucket to stagger\n  const buckets = new Map();\n  for (const m of data.mutations){\n    const key = Math.round(m.pos);\n    if (!buckets.has(key)) buckets.set(key, []);\n    buckets.get(key).push(m);\n  }\n\n  // Tick geometry: ticks go UP from the bar top.\n  // baseline height scales with n patients (log); staggering for cluster\n  const nMax = Math.max(...data.mutations.map(m=>m.n), 1);\n  const minTick = 14, maxTick = 52;\n  function tickLen(n){\n    if (nMax===1) return minTick+18;\n    const t = Math.log(n+1)/Math.log(nMax+1);\n    return minTick + t*(maxTick-minTick);\n  }\n\n  // Axis ticks\n  const axisY = barY + barH + 12;\n  svg.appendChild(mkSVG('line',{x1:padL, y1:axisY, x2:W-padR, y2:axisY, class:'axis-line'}));\n  const nAxis = g.length <= 100 ? 8 : 10;\n  for (let i=0;i<=nAxis;i++){\n    const pos = Math.round(g.length * i / nAxis);\n    const x = xOf(pos);\n    svg.appendChild(mkSVG('line',{x1:x,y1:axisY,x2:x,y2:axisY+4,class:'axis-line'}));\n    const t = mkSVG('text',{x:x, y:axisY+16, class:'axis-tick', 'text-anchor':'middle'});\n    t.textContent = pos===0?1:pos;\n    svg.appendChild(t);\n  }\n\n  // Domain bar (segmented)\n  const domainGroup = mkSVG('g', {});\n  svg.appendChild(domainGroup);\n  g.domains.forEach((d, i) => {\n    const x1 = xOf(d.start), x2 = xOf(d.end);\n    const rect = mkSVG('rect',{x:x1, y:barY, width:x2-x1, height:barH, fill:g.domainTones[i]||'#263545', stroke:'#0f1216', 'stroke-width':1});\n    domainGroup.appendChild(rect);\n    // Domain label - center in segment, if fits\n    const label = mkSVG('text',{x:(x1+x2)/2, y:barY + barH/2 + 4, class:'domain-label', 'text-anchor':'middle', fill:'#c5d1de'});\n    label.textContent = d.name;\n    // Check if fits roughly\n    const segW = x2-x1;\n    const approxW = d.name.length * 6.2;\n    if (approxW > segW - 8){\n      // shrink or rotate or place above\n      if (segW > 40){\n        label.setAttribute('y', barY - 10);\n        label.setAttribute('fill','#8a95a3');\n        label.setAttribute('font-size','9.5');\n      } else {\n        label.style.display='none';\n      }\n    }\n    domainGroup.appendChild(label);\n  });\n\n  // Bar outline\n  svg.appendChild(mkSVG('rect',{x:padL, y:barY, width:innerW, height:barH, fill:'none', stroke:'#3a4656', 'stroke-width':1, rx:2}));\n\n  // Draw ticks - stagger clusters\n  const sortedPositions = [...buckets.keys()].sort((a,b)=>a-b);\n  const allTickInfos = [];\n  for (const pos of sortedPositions){\n    const muts = buckets.get(pos);\n    // stagger by index in cluster: first stays shortest, others grow\n    muts.forEach((m, idx) => {\n      const len = tickLen(m.n) + idx * 12;\n      allTickInfos.push({m, pos, len, idx, total:muts.length});\n    });\n  }\n\n  // Draw ticks going UP from bar top\n  for (const ti of allTickInfos){\n    const x = xOf(ti.m.pos);\n    const color = mutationColor(ti.m);\n    const y1 = barY; // top of bar\n    const y2 = y1 - ti.len;\n\n    const g_tick = mkSVG('g',{});\n    svg.appendChild(g_tick);\n\n    const line = mkSVG('line',{\n      x1:x, y1:y1, x2:x, y2:y2,\n      stroke:color, 'stroke-width':2, 'stroke-linecap':'round',\n      class:'tick',\n      'data-label':ti.m.label\n    });\n    line.style.color = color;\n    g_tick.appendChild(line);\n\n    // Dot at tip\n    const dot = mkSVG('circle',{cx:x, cy:y2, r:ti.m.n>1?3.2:2.2, fill:color, class:'tick-dot', opacity:0.95});\n    g_tick.appendChild(dot);\n\n    // Invisible hit area for easier hover\n    const hit = mkSVG('rect',{x:x-6, y:y2-8, width:12, height:ti.len+12, class:'tick-hit'});\n    g_tick.appendChild(hit);\n\n    const onEnter = () => {\n      line.setAttribute('stroke-width','3.5');\n      line.classList.add('active');\n      dot.setAttribute('r', ti.m.n>1?4.5:3.4);\n      showCard(wrap, ti.m, x, y2);\n    };\n    const onLeave = () => {\n      if (isMobile()) return; // on mobile, card is persistent until dismissed\n      line.setAttribute('stroke-width','2');\n      line.classList.remove('active');\n      dot.setAttribute('r', ti.m.n>1?3.2:2.2);\n      hideCard();\n    };\n    const onTap = (e) => {\n      e.preventDefault(); e.stopPropagation();\n      // toggle: if this tick is the active one, close\n      if (activeTick === line){\n        onLeave();\n        activeTick = null;\n        return;\n      }\n      if (activeTick) {\n        activeTick.setAttribute('stroke-width','2');\n        activeTick.classList.remove('active');\n      }\n      activeTick = line;\n      onEnter();\n    };\n    hit.addEventListener('mouseenter', onEnter);\n    hit.addEventListener('mouseleave', onLeave);\n    line.addEventListener('mouseenter', onEnter);\n    line.addEventListener('mouseleave', onLeave);\n    hit.addEventListener('click', onTap);\n    line.addEventListener('click', onTap);\n  }\n\n  stack.appendChild(panel);\n}\n\n// ------- Card -------\nfunction hideCard(){\n  if (activeTick){\n    activeTick.setAttribute('stroke-width','2');\n    activeTick.classList.remove('active');\n    activeTick = null;\n  }\n  if (activeBackdrop){\n    activeBackdrop.classList.remove('visible');\n    const bd = activeBackdrop;\n    setTimeout(()=>{ if (bd && bd.parentNode) bd.parentNode.removeChild(bd); }, 260);\n    activeBackdrop = null;\n  }\n  if (!activeCard) return;\n  activeCard.classList.remove('visible');\n  const toRemove = activeCard;\n  setTimeout(()=>{ if (toRemove && toRemove.parentNode) toRemove.parentNode.removeChild(toRemove); }, 260);\n  activeCard = null;\n}\n\nfunction showCard(wrap, mut, svgX, svgYTop){\n  hideCard();\n  const card = document.createElement('div');\n  card.className = 'card';\n  const mobile = isMobile();\n\n  // Phenotype badges\n  const badges = allPhenotypeBadges(mut).map(([p,n]) => {\n    const color = PHEN_COLORS[p] || '#888';\n    return `<span class=\"badge\" style=\"background:${color}\">${p}${n>1?` ×${n}`:''}<\u002Fspan>`;\n  }).join('');\n\n  const FEATURE_ORDER = [\n    'Photosensitivity','Skin cancer','Developmental delay','Short stature',\n    'Cognitive impairment','Brain abnormalities','Microcephaly',\n    'Ophthalmologic abnormalities','Hearing loss','Psychomotor impairment',\n    'DNA repair defect','TFIIH instability','Hair abnormalities','Ichthyosis'\n  ];\n  const mainColor = mutationColor(mut);\n  const featHtml = FEATURE_ORDER.map(f => {\n    const fd = mut.features[f];\n    if (!fd) return '';\n    const known = fd.Y + fd.N;\n    if (known === 0){\n      return `<div class=\"feat nd\"><div class=\"name\">${f}<\u002Fdiv><div class=\"bar\"><\u002Fdiv><div class=\"pct\">ND<\u002Fdiv><\u002Fdiv>`;\n    }\n    const pct = Math.round((fd.Y/known)*100);\n    return `<div class=\"feat\"><div class=\"name\">${f}<\u002Fdiv><div class=\"bar\"><div class=\"fill\" style=\"width:${pct}%;--fill:${mainColor}\"><\u002Fdiv><\u002Fdiv><div class=\"pct\">${pct}%<\u002Fdiv><\u002Fdiv>`;\n  }).join('');\n\n  card.innerHTML = `\n    <button class=\"close-x\" aria-label=\"Close\">×<\u002Fbutton>\n    <div class=\"row1\">\n      <div class=\"mut-name\">${mut.label}<\u002Fdiv>\n      <div class=\"n-patients\"><b>n = ${mut.n}<\u002Fb> patient${mut.n===1?'':'s'}<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"raw\">${mut.raw} · position ${mut.pos}<\u002Fdiv>\n    <div class=\"phenos\">${badges}<\u002Fdiv>\n    <div class=\"feat-title\">Clinical features (% Y of patients with data)<\u002Fdiv>\n    ${featHtml}\n  `;\n\n  if (mobile){\n    // Bottom-sheet: attach to body with backdrop\n    const backdrop = document.createElement('div');\n    backdrop.className = 'card-backdrop';\n    backdrop.addEventListener('click', hideCard);\n    document.body.appendChild(backdrop);\n    activeBackdrop = backdrop;\n    document.body.appendChild(card);\n    card.querySelector('.close-x').addEventListener('click', hideCard);\n    requestAnimationFrame(()=>{\n      backdrop.classList.add('visible');\n      card.classList.add('visible');\n    });\n  } else {\n    wrap.appendChild(card);\n    const svgEl = wrap.querySelector('svg');\n    const scrollEl = wrap.querySelector('.map-scroll');\n    const svgRect = svgEl.getBoundingClientRect();\n    const scaleX = svgRect.width / 1340;\n    const scaleY = svgRect.height / 220;\n    // Compensate for horizontal scroll within map-scroll if any\n    const scrollLeft = scrollEl ? scrollEl.scrollLeft : 0;\n    const leftPx = svgX * scaleX - scrollLeft;\n    const topPx = svgYTop * scaleY;\n\n    requestAnimationFrame(()=>{\n      const cardH = card.offsetHeight;\n      const cardW = card.offsetWidth;\n      let top = topPx - cardH - 14;\n      if (top < 4) top = topPx + 90;\n      let left = leftPx;\n      const halfW = cardW/2;\n      if (left - halfW < 8) left = halfW + 8;\n      if (left + halfW > wrap.clientWidth - 8) left = wrap.clientWidth - halfW - 8;\n      card.style.left = left + 'px';\n      card.style.top = top + 'px';\n      requestAnimationFrame(()=>card.classList.add('visible'));\n    });\n  }\n\n  activeCard = card;\n}\n\n// Dismiss card on outside click (desktop & mobile)\ndocument.addEventListener('click', (e)=>{\n  if (!activeCard) return;\n  if (activeCard.contains(e.target)) return;\n  // Also ignore clicks on ticks (they handle their own toggle)\n  if (e.target.closest('.tick, .tick-hit')) return;\n  hideCard();\n});\nwindow.addEventListener('resize', hideCard);\n\n// Render all genes\nGENES.forEach(renderGene);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
